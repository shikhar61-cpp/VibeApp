<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeApp – Connect & Share</title>
  <meta name="description" content="VibeApp — A premium social platform to connect, share posts, and follow people who inspire you.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>
  <div id="toast-container"></div>

  <main class="auth-page">
    <div class="auth-box z-above">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">⚡</div>
        <h1><span class="gradient-text">VibeApp</span></h1>
        <p>Share your vibe with the world</p>
      </div>

      <!-- Card -->
      <div class="card auth-card">
        <div class="auth-tabs" role="tablist">
          <button class="auth-tab active" id="tab-login" role="tab">Sign In</button>
          <button class="auth-tab" id="tab-register" role="tab">Create Account</button>
        </div>

        <!-- Login Form -->
        <form id="form-login" class="auth-form" novalidate>
          <div id="login-error" class="auth-error hidden" role="alert"></div>
          <div class="input-group">
            <label class="input-label" for="login-username">Username</label>
            <input id="login-username" type="text" class="input-field" placeholder="Enter your username" autocomplete="username" required>
          </div>
          <div class="input-group">
            <label class="input-label" for="login-password">Password</label>
            <input id="login-password" type="password" class="input-field" placeholder="Enter your password" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary" id="btn-login">Sign In</button>
          <p class="text-sm text-muted" style="text-align:center">
            Don't have an account?
            <button type="button" onclick="document.getElementById('tab-register').click()"
              style="background:none;color:var(--teal-light);font-weight:600;cursor:pointer">
              Create one →
            </button>
          </p>
        </form>

        <!-- Register Form -->
        <form id="form-register" class="auth-form hidden" novalidate>
          <div id="register-error" class="auth-error hidden" role="alert"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="input-group">
              <label class="input-label" for="reg-firstname">First Name</label>
              <input id="reg-firstname" type="text" class="input-field" placeholder="Alex">
            </div>
            <div class="input-group">
              <label class="input-label" for="reg-lastname">Last Name</label>
              <input id="reg-lastname" type="text" class="input-field" placeholder="Taylor">
            </div>
          </div>
          <div class="input-group">
            <label class="input-label" for="reg-username">Username</label>
            <input id="reg-username" type="text" class="input-field" placeholder="Choose a unique username" autocomplete="username" required>
          </div>
          <div class="input-group">
            <label class="input-label" for="reg-email">Email</label>
            <input id="reg-email" type="email" class="input-field" placeholder="hello@vibeapp.com" autocomplete="email">
          </div>
          <div class="input-group">
            <label class="input-label" for="reg-password">Password</label>
            <input id="reg-password" type="password" class="input-field" placeholder="Min 6 characters" autocomplete="new-password" required>
          </div>
          <div class="input-group">
            <label class="input-label" for="reg-password2">Confirm Password</label>
            <input id="reg-password2" type="password" class="input-field" placeholder="Repeat your password" autocomplete="new-password" required>
          </div>
          <button type="submit" class="btn btn-primary" id="btn-register">Create Account</button>
          <p class="text-sm text-muted" style="text-align:center">
            Already have an account?
            <button type="button" onclick="document.getElementById('tab-login').click()"
              style="background:none;color:var(--teal-light);font-weight:600;cursor:pointer">
              Sign in →
            </button>
          </p>
        </form>
      </div>

      <p class="text-xs text-muted" style="text-align:center;margin-top:16px">
        By joining, you agree to our Terms of Service & Privacy Policy.
      </p>
    </div>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
